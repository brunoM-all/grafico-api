version: '3.9'

services:
  grafico-api:
    build: .
    container_name: grafico-api
    ports:
      - "3001:3000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
